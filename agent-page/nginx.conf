# Frontend nginx: serves the CRA build and reverse-proxies backend routes.
# Backend hostname inside compose: "agent-api" (docker DNS).

upstream agent_api_upstream {
    server agent-api:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Large file uploads (user file manager)
    client_max_body_size 100m;

    # --- Backend proxies ---
    # Use a shared location block for streaming-friendly proxy settings.
    location /api/ {
        proxy_pass         http://agent_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # SSE / streaming: never buffer, long timeouts
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    location /assets/ {
        proxy_pass         http://agent_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass         http://agent_api_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # --- SPA fallback ---
    # Hashed static bundle — safe to cache aggressively
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Everything else → index.html (react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
